# CartPole-v1 experiment configuration
# Method-specific parameters are in separate files (monte_carlo.yaml, dqn.yaml, least_squares_mc.yaml, least_squares_td.yaml)

experiment_id: test_per_episode_hyperparams
data_root: .
environment:
  name: CartPole-v1
policy:
  algorithm: PPO
  seed: 42
  total_timesteps: 10000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  clip_range: 0.2
  max_grad_norm: 0.5
  vf_coef: 0.5
  n_envs: 4
data_generation:
  n_batches: 10
  episodes_per_batch: 1000
  deterministic_policy: false
  n_envs: 64
  tuning_episodes: 1000
  validation_episodes_per_batch: 200
  seed: 42
value_estimators:
  training:
    max_epochs: 1000
    batch_size: 256
    convergence_patience: 50
    convergence_threshold: 0.0001
    eval_frequency: 10
    gamma: 0.99
    episode_subsets:
    - 50
    - 100
    - 500
    - 1000
    shuffle_frequency: 100
    seed: 42
  methods:
  - monte_carlo
  - dqn
  - least_squares_mc
  - least_squares_td
  - nnls_mc
  - nnls_td
network:
  hidden_sizes:
  - 64
  - 64
  activation: relu
  device: auto
logging:
  use_wandb: false
  wandb_project: pooling-eval
  wandb_entity: null
  log_frequency: 100
  wandb_mode: offline
evaluation:
  eval_episodes: 400
  paired_states_n_pairs: 100
  paired_states_n_trajectories: 50
  seed: 42
