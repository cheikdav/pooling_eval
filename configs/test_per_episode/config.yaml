# Hopper-v5 experiment configuration for testing per-episode hyperparameters
# Method-specific parameters are in separate files (monte_carlo.yaml, td.yaml, least_squares_mc.yaml, least_squares_td.yaml)

experiment_id: test_per_episode_hyperparams
data_root: .
environment:
  name: Hopper-v5
  max_episode_steps: 500
policy:
  algorithm: SAC
  seed: 42
  total_timesteps: 10000
  learning_rate: 0.0003
  batch_size: 256
  gamma: 0.99
  learning_starts: 1000
  n_envs: 1
data_generation:
  n_batches: 10
  episodes_per_batch: 1000
  deterministic_policy: false
  n_envs: 64
  tuning_episodes: 1000
  validation_episodes_per_batch: 200
  seed: 42
value_estimators:
  training:
    max_epochs: 1000
    batch_size: 256
    convergence_patience: 50
    convergence_threshold: 0.0001
    eval_frequency: 10
    gamma: 0.99
    episode_subsets:
    - 50
    - 100
    - 500
    - 1000
    shuffle_frequency: 100
    seed: 42
  methods:
  - monte_carlo
  - td
  - least_squares_mc
  - least_squares_td
  - nnls_mc
  - nnls_td
network:
  hidden_sizes:
  - 64
  - 64
  activation: relu
  device: auto
logging:
  use_wandb: false
  wandb_project: pooling-eval
  wandb_entity: null
  log_frequency: 100
  wandb_mode: offline
evaluation:
  eval_episodes: 400
  paired_states_n_pairs: 100
  paired_states_n_trajectories: 50
  seed: 42
