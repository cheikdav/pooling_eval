# W&B Sweep configuration for Monte Carlo estimator
# Usage:
#   1. wandb sweep configs/sweep_monte_carlo.yaml
#   2. wandb agent <sweep-id>

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: bayes  # bayes, grid, or random
metric:
  name: eval/mse
  goal: minimize

parameters:
  config:
    value: configs/example_config.yaml
  method:
    value: monte_carlo
  learning-rate:
    min: 0.0001
    max: 0.01
    distribution: log_uniform
