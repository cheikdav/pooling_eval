# Example configuration for pooling evaluation experiments
# Demonstrates episode subset training: trains separate models on different amounts of data

experiment_id: "cartpole_test"
seed: 42

# Configurable storage paths
data_root: "/scratch/dc3430/pooling_eval"
results_root: "/scratch/dc3430/pooling_eval"

# Environment configuration
environment:
  name: "CartPole-v1"
  # For Atari: name: "ALE/Pong-v5"
  # For MuJoCo: name: "HalfCheetah-v4"

# Policy training (Stable Baselines 3)
policy:
  algorithm: "PPO"
  total_timesteps: 10000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  clip_range: 0.2
  max_grad_norm: 0.5
  vf_coef: 0.5
  n_envs: 4

# Data generation
data_generation:
  n_batches: 80
  episodes_per_batch: 1000
  deterministic_policy: false
  n_envs: 64
  tuning_episodes: 1000
  validation_episodes_per_batch: 200
  eval_episodes: 400

# Value estimator training
value_estimators:
  # Shared training parameters
  training:
    max_epochs: 80000
    batch_size: 256
    convergence_patience: 50
    convergence_threshold: 1.0e-4
    eval_frequency: 10
    gamma: 0.99
    episode_subsets: [25, 50, 100, 250, 500, 1000]
    shuffle_frequency: 100  # Re-shuffle DataLoader every N epochs for efficiency
    test_episodes: 100  # Number of episodes to sample from eval batch for test set (0 = no test set)

  # List of method configurations
  # Each config must have a 'name' (used for output paths/logs) and 'type' (estimator type)
  method_configs:
    - name: "monte_carlo"
      type: "monte_carlo"
      learning_rate: 0.001
      n_initializations: 1

    - name: "dqn"
      type: "dqn"
      learning_rate: 0.003
      n_initializations: 1
      target_update_rate: 0.1

    - name: "least_squares_mc"
      type: "least_squares_mc"
      learning_rate: 0.001  # Not used but required by base config
      n_initializations: 1
      policy_path: null  # Will be auto-set to experiments/<experiment_id>/policy/policy_final.zip
      algorithm: "PPO"
      ridge_lambda: 1.0e-1
      preprocess_fraction: 0.0  # Set to 0.1 to use 10% of data for PCA (0.0 = disabled)
      n_components: null  # Number of PCA components (e.g., 32)

    - name: "least_squares_td"
      type: "least_squares_td"
      learning_rate: 0.001  # Not used but required by base config
      n_initializations: 1
      policy_path: null  # Will be auto-set to experiments/<experiment_id>/policy/policy_final.zip
      algorithm: "PPO"
      ridge_lambda: 1.0e-1
      preprocess_fraction: 0.0  # Set to 0.1 to use 10% of data for PCA (0.0 = disabled)
      n_components: null  # Number of PCA components (e.g., 32)

# Network architecture (will match SB3 critic architecture)
network:
  hidden_sizes: [64, 64]
  activation: "relu"
  device: "auto"  # "cpu" for CPU-only, "auto" for GPU if available (otherwise CPU)

# Logging
logging:
  use_wandb: true
  wandb_project: "pooling-eval"
  wandb_entity: null  # set to your wandb username/team
  log_frequency: 10  # log every N training steps
  wandb_mode: "offline"  # "online" (sync immediately) or "offline" (sync at end of each training)
