# Configuration for MuJoCo Hopper-v4 environment
# Hopper is a challenging one-legged balancing and hopping task (~11 obs dims, 3 action dims)
# Using tuned hyperparameters from SB3 zoo

experiment_id: "hopper_baseline"
seed: 42

# Configurable storage paths
data_root: "/scratch/dc3430/pooling_eval"
results_root: "/scratch/dc3430/pooling_eval"

# Environment configuration
environment:
  name: "Hopper-v4"

# Policy training (Stable Baselines 3)
# Hyperparameters from SB3 zoo, adapted for 32 parallel envs
policy:
  algorithm: "PPO"
  total_timesteps: 1000000
  learning_rate: 9.80828e-05
  n_steps: 16
  batch_size: 32
  n_epochs: 5
  gamma: 0.999
  gae_lambda: 0.99
  ent_coef: 0.00229519
  clip_range: 0.2
  max_grad_norm: 0.7
  vf_coef: 0.835671
  n_envs: 32
  policy_kwargs:
    net_arch:
      - pi: [256, 256]
        vf: [256, 256]
    activation_fn: relu
  use_vec_normalize: true
  normalize_obs: true
  normalize_reward: true

# Data generation
data_generation:
  n_batches: 50
  episodes_per_batch: 200
  deterministic_policy: false
  n_envs: 64
  tuning_episodes: 200
  validation_episodes_per_batch: 50
  eval_episodes: 100

# Value estimator training
value_estimators:
  # Shared training parameters
  training:
    max_epochs: 30000
    batch_size: 256
    convergence_patience: 60
    convergence_threshold: 1.0e-4
    eval_frequency: 20
    gamma: 0.999
    shuffle_frequency: 100
    test_episodes: 50

  # List of method configurations
  method_configs:
    - name: "monte_carlo"
      type: "monte_carlo"
      learning_rate: 0.001
      n_initializations: 3

    - name: "dqn"
      type: "dqn"
      learning_rate: 0.001
      n_initializations: 3
      target_update_rate: 0.005

    - name: "least_squares_mc"
      type: "least_squares_mc"
      learning_rate: 0.001
      n_initializations: 1
      policy_path: null
      algorithm: "PPO"
      ridge_lambda: 1.0e-6
      preprocess_fraction: 0.0
      n_components: null

    - name: "least_squares_td"
      type: "least_squares_td"
      learning_rate: 0.001
      n_initializations: 1
      policy_path: null
      algorithm: "PPO"
      ridge_lambda: 1.0e-6
      preprocess_fraction: 0.0
      n_components: null

# Network architecture
network:
  hidden_sizes: [128, 128]
  activation: "relu"
  device: "auto"

# Logging
logging:
  use_wandb: true
  wandb_project: "pooling-eval"
  wandb_entity: null
  log_frequency: 20
  wandb_mode: "offline"
