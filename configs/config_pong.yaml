# Configuration for Pong (Atari) environment
# Requires: pip install "gymnasium[atari,accept-rom-license]"

experiment_id: "pong_test"
seed: 42

# Environment configuration
environment:
  name: "ALE/Pong-v5"

# Policy training (Stable Baselines 3)
policy:
  algorithm: "PPO"
  total_timesteps: 2000000  # Atari typically needs 1M-10M steps
  learning_rate: 0.00025  # Standard Atari learning rate
  n_steps: 128  # Smaller for Atari (vs 2048 for CartPole)
  batch_size: 256  # Larger batch for Atari
  n_epochs: 4  # Fewer epochs per update for Atari
  gamma: 0.99
  gae_lambda: 0.95
  n_envs: 8  # More parallel envs for Atari
  clip_range: 0.1  # Tighter clip range for Atari
  ent_coef: 0.01  # Entropy coefficient for exploration
  max_grad_norm: 0.5
  vf_coef: 0.5

# Data generation
data_generation:
  n_batches: 50  # Fewer batches since episodes are longer
  episodes_per_batch: 200  # Fewer episodes (Atari episodes can be long)
  deterministic_policy: false
  n_envs: 16
  tuning_episodes: 200
  validation_episodes_per_batch: 50
  eval_episodes: 100

# Value estimator training
value_estimators:
  # Shared training parameters
  training:
    max_epochs: 80000
    batch_size: 512  # Larger batch for more data
    convergence_patience: 50
    convergence_threshold: 1.0e-4
    eval_frequency: 10
    gamma: 0.99
    episode_subsets: [50, 100, 150, 200]  # Fewer episodes needed due to longer trajectories
    shuffle_frequency: 100
    test_episodes: 50

  # List of method configurations
  method_configs:
    - name: "monte_carlo"
      type: "monte_carlo"
      learning_rate: 0.0001  # Lower LR for Atari
      n_initializations: 2

    - name: "dqn"
      type: "dqn"
      learning_rate: 0.0003
      n_initializations: 2
      target_update_rate: 0.01  # Slower updates for stability

    - name: "least_squares_mc"
      type: "least_squares_mc"
      learning_rate: 0.0001
      n_initializations: 1
      policy_path: null
      algorithm: "PPO"
      ridge_lambda: 1.0e-5
      preprocess_fraction: 0.0
      n_components: null

    - name: "least_squares_td"
      type: "least_squares_td"
      learning_rate: 0.0001
      n_initializations: 1
      policy_path: null
      algorithm: "PPO"
      ridge_lambda: 1.0e-5
      preprocess_fraction: 0.0
      n_components: null

# Network architecture
# Note: For Atari, observations are images (84x84x4 after preprocessing)
# The value estimators will use CNN feature extraction followed by MLP
network:
  hidden_sizes: [512]  # Single larger hidden layer after CNN features
  activation: "relu"
  device: "auto"

# Logging
logging:
  use_wandb: true
  wandb_project: "pooling-eval"
  wandb_entity: null
  log_frequency: 100  # Log less frequently for Atari
  wandb_mode: "offline"
