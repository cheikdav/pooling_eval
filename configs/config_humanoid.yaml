# Configuration for MuJoCo Humanoid-v4 environment
# Humanoid is a high-dimensional continuous control task with 376 obs dims and 17 action dims

experiment_id: "humanoid_baseline"
seed: 42

# Configurable storage paths
data_root: "/scratch/dc3430/pooling_eval"
results_root: "/scratch/dc3430/pooling_eval"

# Environment configuration
environment:
  name: "Humanoid-v4"

# Policy training (Stable Baselines 3)
policy:
  algorithm: "PPO"
  total_timesteps: 20000000
  learning_rate: 0.00003
  n_steps: 64
  batch_size: 512
  n_epochs: 5
  gamma: 0.95
  gae_lambda: 0.9
  ent_coef: 0.0
  clip_range: 0.2
  max_grad_norm: 0.5
  vf_coef: 0.5
  n_envs: 32
  policy_kwargs:
    net_arch:
      - pi: [256, 256]
        vf: [256, 256]
    activation_fn: tanh
  use_vec_normalize: true
  normalize_obs: true
  normalize_reward: false

# Data generation
data_generation:
  n_batches: 80
  episodes_per_batch: 600
  deterministic_policy: false
  n_envs: 128
  tuning_episodes: 400
  validation_episodes_per_batch: 100
  eval_episodes: 200

# Value estimator training
value_estimators:
  # Shared training parameters
  training:
    max_epochs: 100000  # More epochs for complex environment
    batch_size: 512  # Larger batch size for stability with high-dim observations
    convergence_patience: 100  # More patience for complex value landscape
    convergence_threshold: 1.0e-4
    eval_frequency: 20  # evaluate every N epochs
    gamma: 0.99  # discount factor (shared by all methods)
    shuffle_frequency: 100  # Re-shuffle DataLoader every N epochs for efficiency
    test_episodes: 100  # Number of episodes to sample from eval batch for test set (0 = no test set)
    episode_subsets: [50, 100, 200, 400, 600]

  # List of method configurations
  # Each config must have a 'name' (used for output paths/logs) and 'type' (estimator type)
  method_configs:
    - name: "monte_carlo"
      type: "monte_carlo"
      learning_rate: 
        default: 0.0002  
        50: 0.005
        100: 0.0035
        200: 0.0015
        400: 0.004
        600: 0.00015
      batch_size:
        default: 512  
        50: 128
        100: 64
        200: 512
        400: 512
        600: 64
      n_initializations: 1  # More initializations for robustness

    - name: "dqn"
      type: "dqn"
      learning_rate: 
      default: 0.02  # Lower learning rate for stability
      50: 0.0013
      batch_size:
        default: 256
        50: 64
        100: 128
      target_update_rate: 
        default: 0.05
        50: 0.28
      n_initializations: 1
      

    - name: "least_squares_mc"
      type: "least_squares_mc"
      learning_rate: 0.001  # Not used but required by base config
      n_initializations: 1
      policy_path: null  # Will be auto-set to experiments/<experiment_id>/policy/policy_final.zip
      algorithm: "PPO"
      ridge_lambda: 1.0e-1
      preprocess_fraction: 0.1  # Set to 0.1 to use 10% of data for PCA (0.0 = disabled)
      n_components: 64  # Number of PCA components (e.g., 64, 128)

    - name: "least_squares_td"
      type: "least_squares_td"
      learning_rate: 0.001  # Not used but required by base config
      n_initializations: 1
      policy_path: null  # Will be auto-set to experiments/<experiment_id>/policy/policy_final.zip
      algorithm: "PPO"
      ridge_lambda: 1.0e-1
      preprocess_fraction: 0.1  # Set to 0.1 to use 10% of data for PCA (0.0 = disabled)
      n_components: 64  # Number of PCA components (e.g., 64, 128)

# Network architecture (larger for high-dimensional observations)
# Humanoid has 376-dim observations, so we need larger networks
network:
  hidden_sizes: [256, 256, 128]  # Deeper and wider for complex state space
  activation: "relu"
  device: "auto"  # "cpu" for CPU-only, "auto" for GPU if available (otherwise CPU)

# Logging
logging:
  use_wandb: true
  wandb_project: "pooling-eval"
  wandb_entity: null  # set to your wandb username/team
  log_frequency: 10  # log every N training steps
  wandb_mode: "offline"  # "online" (sync immediately) or "offline" (sync at end of each training)
