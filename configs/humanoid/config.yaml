# Humanoid-v5 experiment configuration
# Method-specific parameters are in separate files (monte_carlo.yaml, dqn.yaml, least_squares_mc.yaml, least_squares_td.yaml)

experiment_id: humanoid_baseline
seed: 42
data_root: /scratch/dc3430/pooling_eval
results_root: /scratch/dc3430/pooling_eval
environment:
  name: Humanoid-v5
  reset_noise_scale: 0.04  # Noise scale for initial state (default: 0.01)
policy:
  algorithm: PPO
  total_timesteps: 20000000
  learning_rate: 3.0e-05
  n_steps: 64
  batch_size: 512
  n_epochs: 5
  gamma: 0.95
  gae_lambda: 0.9
  ent_coef: 0.0
  clip_range: 0.2
  max_grad_norm: 0.5
  vf_coef: 0.5
  n_envs: 32
  policy_kwargs:
    net_arch:
    - pi:
      - 256
      - 256
      vf:
      - 256
      - 256
    activation_fn: tanh
  use_vec_normalize: true
  normalize_obs: true
  normalize_reward: false
data_generation:
  n_batches: 100
  episodes_per_batch: 80
  deterministic_policy: false
  n_envs: 128
  tuning_episodes: 80
  validation_episodes_per_batch: 42
value_estimators:
  training:
    max_epochs: 100000
    batch_size: 512
    convergence_patience: 100
    convergence_threshold: 0.01
    eval_frequency: 20
    gamma: 0.99
    shuffle_frequency: 100
    episode_subsets:
    - 10
    - 15
    - 20
    - 40
    - 80
  methods:
  - monte_carlo
  - dqn
  #- least_squares_mc
  #- least_squares_td
  #- least_squares_mc_rbf
  #- least_squares_td_rbf
  #- nnls_mc
  #- nnls_td
network:
  hidden_sizes:
  - 256
  - 256
  - 128
  activation: relu
  device: auto
logging:
  use_wandb: true
  wandb_project: pooling-eval
  wandb_entity: null
  log_frequency: 10
  wandb_mode: offline
evaluation:
  eval_episodes: 100
  paired_states_n_pairs: 100
  paired_states_n_trajectories: 4000
  paired_states_seed: 237
