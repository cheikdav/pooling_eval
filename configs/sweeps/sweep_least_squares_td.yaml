# W&B Sweep configuration for Least Squares Temporal Difference estimator
# Usage:
#   python launch_episode_sweeps.py --config configs/config_humanoid.yaml --method least_squares_td

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: random  # bayes, grid, or random
metric:
  name: final/best_val_mc_loss
  goal: minimize

# Termination conditions
run_cap: 40  # Maximum number of runs before sweep terminates

parameters:
  method:
    value: least_squares_td
  wandb-mode:
    value: offline
  ridge-lambda:
    min: 0.5
    max: 1.0
    distribution: log_uniform_values
  n-components:
    values: [64, 128, 256]
  preprocess-fraction:
    values: [0.0, 0.05, 0.1, 0.2]
  n-initializations:
    value: 1
  parallel-inits:
    value: true
  n-jobs:
    value: 1
