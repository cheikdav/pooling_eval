# W&B Sweep configuration for Least Squares Temporal Difference estimator
# Usage:
#   1. wandb sweep configs/sweep_least_squares_td.yaml
#   2. wandb agent <sweep-id>

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: random  # bayes, grid, or random
metric:
  name: final/best_val_mc_loss
  goal: minimize

# Termination conditions
run_cap: 30  # Maximum number of runs before sweep terminates

parameters:
  config:
    value: configs/config_humanoid.yaml
  method:
    value: least_squares_td
  ridge-lambda:
    min: 1.0e-8
    max: 1.0
    distribution: log_uniform_values
  n-components:
    values: [16, 32, 64, 128, 256]
  preprocess-fraction:
    values: [0.05, 0.1, 0.2]
  num-episodes:
    values: [50, 100, 200, 400]
