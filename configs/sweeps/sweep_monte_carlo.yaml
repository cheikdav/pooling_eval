# W&B Sweep configuration for Monte Carlo estimator
# Usage:
#   python launch_episode_sweeps.py --config configs/config_humanoid.yaml --method monte_carlo

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: bayes  # bayes, grid, or random
metric:
  name: final/best_val_mc_loss
  goal: minimize

# Termination conditions
run_cap: 30  # Maximum number of runs before sweep terminates

parameters:
  method:
    value: monte_carlo
  wandb-mode:
    value: offline
  learning-rate:
    min: 0.0001
    max: 0.01
    distribution: log_uniform_values
  batch-size:
    values: [64, 128, 256, 512]
  n-initializations:
    value: 5
  parallel-inits:
    value: true
  n-jobs:
    value: 5
