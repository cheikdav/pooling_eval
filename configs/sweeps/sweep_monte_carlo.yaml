# W&B Sweep configuration for Monte Carlo estimator
# Usage:
#   1. wandb sweep configs/sweep_monte_carlo.yaml
#   2. wandb agent <sweep-id>

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: bayes  # bayes, grid, or random
metric:
  name: final/best_val_mc_loss
  goal: minimize

# Termination conditions
run_cap: 30  # Maximum number of runs before sweep terminates

parameters:
  config:
    value: configs/config_humanoid.yaml
  method:
    value: monte_carlo
  learning-rate:
    min: 0.0001
    max: 0.01
    distribution: log_uniform_values
  num-episodes:
    values: [ 50, 100, 200, 400]
  batch-size:
    values: [64, 128, 256, 512]
