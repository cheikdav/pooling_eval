# W&B Sweep configuration for Least Squares Monte Carlo with RBF features
program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: random
metric:
  name: final/mean_val_mc_loss
  goal: minimize

run_cap: 40

parameters:
  method:
    value: least_squares_mc_rbf
  log-frequency:
    value: 1
  ridge-lambda:
    min: 1.0e-4
    max: 1.0
    distribution: log_uniform_values
  rbf-n-components:
    values: [128, 256, 512, 1024]
  n-initializations:
    value: 1
  parallel-inits:
    value: true
  n-jobs:
    value: 1
