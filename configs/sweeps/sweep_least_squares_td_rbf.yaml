# W&B Sweep configuration for Least Squares Temporal Difference with RBF features
program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: random
metric:
  name: final/mean_val_mc_loss
  goal: minimize
run_cap: 40
parameters:
  method:
    value: least_squares_td_rbf
  log-frequency:
    value: 100
  n-jobs:
    value: 4
  ridge-lambda:
    min: 1.0e-4
    max: 1.0
    distribution: log_uniform_values
  rbf-n-components:
    values: [512, 1024, 2048, 4096, 8192]
  rbf-gamma:
    min: 1.0e-3
    max: 10.0
    distribution: log_uniform_values
