# W&B Sweep configuration for DQN estimator
# Usage:
#   python launch_episode_sweeps.py --config configs/config_humanoid.yaml --method dqn

program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: random  # bayes, grid, or random
metric:
  name: final/best_val_mc_loss
  goal: minimize

# Termination conditions
run_cap: 30  # Maximum number of runs before sweep terminates

parameters:
  method:
    value: dqn
  learning-rate:
    min: 0.001
    max: 0.1
    distribution: log_uniform_values
  target-update-rate:
    min: 0.001
    max: 0.2
    distribution: log_uniform_values
  batch-size:
    values: [64, 128, 256, 512]
  n-initializations:
    value: 5
