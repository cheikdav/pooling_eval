# W&B Sweep configuration for TD estimator
# Usage:
#   python launch_episode_sweeps.py --config configs/config_humanoid.yaml --method td
program: uv
command:
  - ${env}
  - uv
  - run
  - -m
  - src.tune_hyperparameters
  - ${args}
method: bayes  # bayes, grid, or random
metric:
  name: final/mean_val_mc_loss
  goal: minimize
# Termination conditions
run_cap: 40  # Maximum number of runs before sweep terminates
parameters:
  method:
    value: td
  log-frequency:
    value: 100
  n-jobs:
    value: 4
  learning-rate:
    min: 0.00005
    max: 0.1
    distribution: log_uniform_values
  target-update-rate:
    min: 0.001
    max: 1
    distribution: log_uniform_values
  batch-size:
    values: [64, 128, 256, 512]
