# Ant-v5 experiment configuration
# Method-specific parameters are in separate files (monte_carlo.yaml, dqn.yaml, least_squares_mc.yaml, least_squares_td.yaml)

experiment_id: ant_baseline
seed: 42
data_root: /scratch/dc3430/pooling_eval
environment:
  name: Ant-v5
  max_episode_steps: 1500
  reset_noise_scale: 0.1
  action_noise_std: 0.03
policy:
  algorithm: SAC
  total_timesteps: 500000
  learning_rate: 0.0003
  batch_size: 256
  gamma: 0.99
  learning_starts: 10000
  buffer_size: 1000000
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  n_envs: 1
  policy_kwargs:
    net_arch:
    - 256
    - 256
  use_vec_normalize: false
data_generation:
  n_batches: 100
  episodes_per_batch: 80
  deterministic_policy: false
  n_envs: 128
  tuning_episodes: 80
  validation_episodes_per_batch: 45
value_estimators:
  training:
    max_epochs: 50000
    batch_size: 256
    convergence_patience: 80
    convergence_threshold: 0.01
    eval_frequency: 20
    gamma: 0.99
    shuffle_frequency: 100
    episode_subsets:
        - 10
        - 20
        - 40
        - 80

  methods:
  - monte_carlo
  - dqn
  #- least_squares_mc
  #- least_squares_td
  #- least_squares_mc_rbf
  #- least_squares_td_rbf
  #- nnls_mc
  #- nnls_td
network:
  hidden_sizes:
  - 256
  - 256
  activation: relu
  device: auto
logging:
  use_wandb: true
  wandb_project: pooling-eval
  wandb_entity: null
  log_frequency: 20
  wandb_mode: offline
evaluation:
  eval_episodes: 100
  paired_states_n_pairs: 100
  paired_states_n_trajectories: 4000
  paired_states_seed: 237
